<html>
<head>
    <meta charset="UTF-8" />
    <title>Patient Registration - Gulfstone Medical</title>
    <link rel="stylesheet" href="style.css" />
</head>
 
<body>
  <!-- Banner withlogo and date-->
<div id="banner">
  <img src="logo.png" alt="Gulfstone logo" class="logo">
  <div class="title-block">
    <h1>Gulfstone Medical</h1>
       <br>
    <div>Today is: <span id="todayDate"></span></div>
  </div>
</div>
  <!--main area-->
  <div id="main">
    <h2>Patient Registration Form</h2>
    <form id="patientForm" action="thankyou.html">
      <table class="form-table">
      
  <!--Personal Info-->
        <tr class="section-row">
          <td colspan="6" class="section-title">Personal Information</td>
        </tr>
          <tr>
            <td width="150"><label for="firstName">First Name</label></td>
          <td><input type="text" 
            id="firstName" 
            name="firstName" 
            maxlength="30"
            pattern="[A-Za-z'-]{1,30}"
            title="1 to 30 letters, apostrophes, or dashes only"
            required 
            oninvalid="this.setCustomValidity('1 to 30 letters, apostrophes, or dashes only')"
            oninput="this.setCustomValidity('')"    
            onblur="checkFirstName()" />
            <span id="firstName_msg" style="font-size:13px;"></span>
            </td>
          <td class="center-cell" width="30"><label for="middleInitial">MI</label>
          </td><td width="40">
           <input type="text" 
                id="middleInitial" 
                name="middleInitial" 
                maxlength="1"
                pattern="[A-Za-z]?"
                title="One letter only"
                class="mi-box"
                oninvalid="this.setCustomValidity('One letter only.')"
                oninput="this.setCustomValidity('')" />
              <span id="middleInitial_msg" style="font-size:13px;"></span>
          </td>
            <td width="180"><label for="lastName">Last Name</label></td>
              <td width="180">
                <input type="text"  
                    id="lastName"
                    name="lastName" 
                    maxlength="30" 
                    required
                    pattern="[A-Za-z'\- ]{2,30}"
                    title="2 to 30 characters, Letters, apostrophes, dashes only"
                    oninvalid="this.setCustomValidity('2 to 30 characters, Letters, apostrophes, dashes only')"
                    oninput="this.setCustomValidity('')" 
                    onblur="checkLastName()" />
                <br>
                    <span id="lastName_msg" style="font-size:13px;"></span>
                </td>
          </tr>
        <tr>
          <td><label for="dob">Date of Birth</label></td>
          <td colspan="5">
             <input type="date"
                id="dob"
                name="dob"
                min="1906-01-01"
                max="2026-12-31"
                title="Date of birth: cannot be in the future or more than 120 years ago."
                required 
                onblur="checkDOB()"/>
              <br>
              <span id="dob_msg" style="font-size:13px;"></span>
          </td>
        </tr>
        <!--Contact info-->
        <tr class="section-row">
          <td colspan="6" 
              class="section-title">Contact &amp; Verification</td>
        </tr>
        <tr>
        <td><label for="email">Email</label></td>
          <td colspan="5">
            <input type="email" 
                id="email"
                name="email"
                placeholder="name@domain.tld"
                required
                title="Enter a valid email address in the format name@domain.tld."
                oninvalid="this.setCustomValidity('Please enter a valid email address.')"
                oninput="this.setCustomValidity('')" />
              <br>
              <span id="email_msg" style="font-size:13px;"></span>
          </td>
        </tr>
        <tr>
          <td><label for="phone">Phone Number</label></td>
          <td colspan="5">
            <input type="tel" 
                id="phone"
                name="phone"
                placeholder="###-###-####"
                pattern="\d{3}-\d{3}-\d{4}"
                title="Phone number in the format ###-###-####."
                oninvalid="this.setCustomValidity('Phone format: ###-###-####')"
                oninput="this.setCustomValidity('')" 
                onblur="checkPhone()"/>
              <span id="phone_msg" style="font-size:13px;"></span>
          </td>
        </tr>
        <tr>
          <td><label for="ssn">Social Security</label></td>
          <td colspan="5">
            <input type="password" 
                id="ssn" 
                name="ssn" 
                pattern="\d{3}-\d{2}-\d{4}"
                minlength="11"
                maxlength="11" 
                placeholder="***-**-****" 
                title="Social Security number. Entry is hidden for security."/>
              <br>
              <span id="ssn_msg" style="font-size:13px;"></span>
          </td>
        </tr>
        
        <!--Adresss- -->
        <tr class="section-row">
          <td colspan="6" 
              class="section-title">Address</td>
        </tr>
        <tr>
          <td>
              <label for="addr1">Address Line 1</label>
          </td>
          <td colspan="5">
              <input type="text" 
                  id="addr1" 
                  name="addr1"
                  maxlength="30" 
                  required
                  title="Street address, 2 to 30 characters. Required."
                  oninvalid="this.setCustomValidity('Address line 1 is required.')"
                  oninput="this.setCustomValidity('')" />
              <br>
              <span id="addr1_msg" style="font-size:13px;"></span>
          </td>
        </tr>
        <tr>
          <td><label for="addr2">Address Line 2</label></td>
          <td colspan="5">
              <input type="text"
                  id="addr2"
                  name="addr2"
                  minlength="2"
                  maxlength="30"
                  title="Apartment, suite, or unit, Not required. 2 to 30 characters." />
              <br>
              <span id="addr1_msg" style="font-size:13px;"></span>
      </td>
        </tr>
        <tr>
          <td>
              <label for="city">City</label>
          </td>
          <td>
              <input type="text"
                id="city"
                name="city"
                minlength="2"
                maxlength="30"
                required
                pattern="[A-Za-z .'-]{2,30}"
                title="City name, 2 to 30 characters. Required."
                oninvalid="this.setCustomValidity('City is required.')"
                oninput="this.setCustomValidity('')" />
              <br>
              <span id="addr2_msg" style="font-size:13px;"></span>
          </td>
         <td style="text-align:right;">
             <label for="state">State</label>
             
         </td>
           <td class="center-cell">
             <select 
                 id="state" 
                 name="state" 
                 required
                 title="Select your state. Required.">
                <option value=""></option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="DC">District Of Columbia</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="PR">Puerto Rico</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
            </select>
               <br>
               <span id="state_msg" style="font-size:13px;"></span> a
          </td>
          <td width="50">
              <label for="zip">ZIP</label>
          </td>
          <td width="140">
              <input type="text" 
                  id="zip" 
                  name="zip"
                  minlength="5" 
                  maxlength="10" 
                  placeholder="77002" 
                  required
                  pattern="\d{5}(-\d{4})?"
                  title="ZIP code: 5 digits required."
                  oninvalid="this.setCustomValidity('5 digit ZIP code required.')"
                  oninput="this.setCustomValidity('')" />
              <br>
              <span id="zip_msg" style="font-size:13px;"></span>
          </td>
        </tr>
        <!--Account Questions-->
        <tr class="section-row">
          <td colspan="6" class="section-title">Account Creation</td>
        </tr>
        <tr>
          <td><label for="userId">Desired User ID</label>
          </td>
          <td colspan="5"><input type="text" 
                id="userId" 
                name="userId" 
                maxlength="20" 
                required
                pattern="[A-Za-z][A-Za-z0-9_-]{4,19}"
                title="User ID: 5 to 20 characters. Must start with a letter. Letters, numbers, underscore and dash allowed. No spaces."
                onblur="lowerCaseId()"
                oninvalid="this.setCustomValidity('User ID: 5-20 chars, start with a letter, no spaces.')"
                oninput="this.setCustomValidity('')" />
              <br>
              <span id="userId_msg" style="font-size:13px;"></span>
          </td>
        </tr>
 
        <tr>
          <td>
              <label for="pwd">Password</label>
          </td>
          <td colspan="2">
              <input type="password" 
                  id="pwd" 
                  name="pwd" 
                  required 
                  pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
                  title="Password: 8 to 30 characters. Must include uppercase, lowercase, number, and number."
                  oninvalid="this.setCustomValidity('Password needs uppercase, lowercase, and number. 8-30 characters.')"
                  oninput="this.setCustomValidity('')" 
                  onblur="checkPassword()" />
              <span id="pwd_msg" style="font-size:13px;"></span>
          </td>
 
          <td>
              <label for="pwd2">Re-enter Password</label>
          </td>
              <td colspan="2">
              <input type="password" 
                  id="pwd2" 
                  name="pwd2" 
                  required 
                  title="Re-enter your password exactly as you typed it before"
                  oninput="checkPasswords()" />
                <br>
                  <span id="pwd2_msg" style="font-size:13px;"></span>
              </td>
            </tr>
 
        <!-- Health Quesiton -->
        <tr class="section-row">
          <td colspan="6" class="section-title">Health &amp; Insurance Questions</td>
        </tr>
        <tr>
         <td class="top"><label>Gender</label></td>
          <td colspan="5">
            <label>
                <input type="radio" 
                    name="gender" 
                    value="male" /> Male</label>
            <label><input type="radio" 
                       name="gender" 
                       value="female" /> Female</label>
            <label><input type="radio" 
                       name="gender" 
                       value="other" /> Other</label>
          </td>
        </tr>
            
        <tr>
          <td class="top"><label>Vaccinated?</label></td>
          <td colspan="5">
            <label>
                <input type="radio" 
                    name="vaccinated" 
                    value="yes" /> Yes</label>
            <label>
                <input type="radio" 
                    name="vaccinated" 
                    value="no" /> No</label>
          </td>
        </tr>
 
        <tr>
          <td class="top"><label>Insurance?</label></td>
          <td colspan="5">
            <label>
                <input type="radio"
                    name="insurance" 
                    value="yes" /> Yes</label>
            <label>
                <input type="radio"
                    name="insurance" 
                    value="no" /> No</label>
          </td>
        </tr>
 
        <tr>
          <td class="top"><label for="health">Current Wellness</label></td>
          <td colspan="5">
            <div class="slider-row">
              <span class="slider-num">1</span>
              <input type="range" id="health" name="health" min="1" max="10" value="5" class="wellness-slider" />
              <span class="slider-num">10</span>
              &nbsp;&nbsp;Current value: <span id="healthDisplay">5</span>
          </div>
          </td>
        </tr>
 
        <tr>
          <td class="top"><label>Past Illnesses (check all that apply)</label></td>
          <td colspan="5">
            <label><input type="checkbox" name="illnesses" value="flu" /> Seasonal Flu</label>
            <label><input type="checkbox" name="illnesses" value="covid19" /> Covid-19</label>
            <label><input type="checkbox" name="illnesses" value="asthma" /> Asthma</label>
            <label><input type="checkbox" name="illnesses" value="diabetes" /> Diabetes</label>
            <label><input type="checkbox" name="illnesses" value="hypertension" /> Hypertension</label>
          </td>
        </tr>
 
        <tr>
          <td class="top"><label for="symptoms">Describe current symptoms</label></td>
          <td colspan="5">
            <textarea id="symptoms" name="symptoms" rows="3" placeholder="Describe symptoms here..."></textarea>
          </td>
        </tr>
 
        <tr>
          <td colspan="6" class="buttons">
            <input type="reset" 
                value="Clear and Start Over" 
                class="btn secondary" />
              <input type="button" 
                  value="Review" 
                  onclick="reviewData()" 
                  class="btn secondary" />
              <input type="submit" 
                  value="Submit" 
                  class="btn primary" />
          </td>
        </tr>
      </table>
    </form>
      <div id="reviewBox"></div>
  </div>
 
  <!--Footer-->
 <div id="footer">
     <table width="100%">
    <tr>
      <td nowrap>
        <strong>Gulfstone Medical</strong>
          <br>
        1234 Main St, Suite 200<br>
        Houston, TX 77030
      </td>
 
      <td align="center" width="100%">
        <button type="button" class="btn secondary"
          onclick="alert('Contact Us: support@gulfstonemedical.com')">
          Contact Us
        </button>
      </td>
 
      <td align="right" nowrap>
        <a href="https://x.com" target="_blank" rel="noopener">X</a> |
        <a href="https://facebook.com" target="_blank" rel="noopener">Facebook</a>
      </td>
    </tr>
  </table>
</div>
  <!--Script-->
    <script src="homework3.js"></script>
    <script>
      document.getElementById("todayDate").innerHTML =
        new Date().toLocaleDateString("en-US", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
    </script>
</body>
</html>
